appId: com.example.app
# udid: intentionally omitted — supply via DEVICE_UDID env var at runtime:
#   DEVICE_UDID=<your-udid> npm run flow:test
platform: ios
name: Login Flow
timeout: 10000
resetApp: false
---
- launchApp
- tapOn: "Username"
- inputText: "testuser"
- tapOn: "Password"
- inputText: "password123"
- tapOn: "Submit"
- assertVisible: "Welcome"
